name: Bug Report
description: Create a report to help us improve HydraSight
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible.
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: What commands did you type? What was the context?
      placeholder: |
        1. Start HydraSight
        2. Type '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Please paste any relevant tracebacks or output from the REPL.
      render: shell
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g., Windows 11, Kali Linux, macOS
    validations:
      required: true
  - type: input
    id: python_version
    attributes:
      label: Python Version
      placeholder: e.g., 3.10.6
    validations:
      required: true
  - type: dropdown
    id: execution_mode
    attributes:
      label: Execution Mode
      description: Which execution mode were you running in?
      options:
        - "confirm (default)"
        - "auto"
        - "never"
    validations:
      required: true
