name: HydraSight CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check hydrasight/ tests/

      - name: Ruff format check
        run: ruff format --check hydrasight/ tests/

      - name: Pylint
        run: pylint hydrasight/ --fail-under=9.0

      - name: Mypy (type check)
        run: mypy hydrasight/ --ignore-missing-imports

      - name: Compile check
        run: python -m compileall hydrasight/ tests/

      - name: Pytest
        run: pytest tests/ -v --tb=short --cov=hydrasight --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.11'
        with:
          name: coverage-report
          path: .coverage
